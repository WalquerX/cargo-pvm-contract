name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]


jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92
          components: rustfmt, clippy, rust-src
      - name: Install solc
        run: |
          SOLC_VERSION=0.8.26
          curl -L https://github.com/ethereum/solidity/releases/download/v${SOLC_VERSION}/solc-static-linux \
          -o solc
          chmod +x solc
          sudo mv solc /usr/local/bin/solc
      - name: Install Rust nightly for scaffold tests
        run: |
          rustup toolchain install nightly --component rust-src --profile minimal
      - name: Run formatting check
        run: cargo fmt --check
      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Run unit tests (types + macros)
        run: cargo test -p pvm-contract-types --features alloc && cargo test -p pvm-contract-macros
      - name: Run integration tests
        run: cargo test -p cargo-pvm-contract

  check-examples:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92
          components: rust-src
      - name: Install Rust nightly for example build
        run: |
          rustup toolchain install nightly --component rust-src --profile minimal
      - name: Install solc
        run: |
          SOLC_VERSION=0.8.26
          curl -L https://github.com/ethereum/solidity/releases/download/v${SOLC_VERSION}/solc-static-linux \
          -o solc
          chmod +x solc
          sudo mv solc /usr/local/bin/solc
      - name: Build example project
        working-directory: examples/example-mytoken
        run: env -u CARGO -u RUSTUP_TOOLCHAIN cargo build --release
